name: docker-build-push-cicd

on:  
  workflow_dispatch: 

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: login into Docker Hub
        uses: docker/login-action@v3
        with:
        # Step 1 - get the username & password from your github actions. Go to your github repos -> Settings -> 'Secrets & variables' -> select 'action'.
        # Step 2 - create variable as dockerhub_user & get your token from docker hub(https://app.docker.com) -> Account setting -> Personal Access Token -> generate new token & give description as dockerhub_token then give '30days' & permission as 'read&write' -> now you can copy that token & paste it to github actions secret as value.
        # Step 3 - Now, you will have your dockerhub username(variable) & password(secret) 
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: build & push to dockerhub
        uses: docker/build-push-action@v6
        # Tag the image (docker build -t ). basically name for your docker image
        with:
          push: true
          tags: 
          # Your image name will be savikanade/github-actions-app:latest
            ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
            
            
